<!DOCTYPE html>
<html>
<head>
    <title>Smart Campus Event Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Smart Campus</a>

        <div>
    {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a href="{% url 'leaderboard' %}" class="btn btn-warning btn-sm me-2">Leaderboard</a>
        <a href="{% url 'admin:index' %}" class="btn btn-info btn-sm me-2">Admin</a>
        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary btn-sm me-2">Analytics</a>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-success btn-sm me-2">Login</a>
        <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Register</a>
    {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
