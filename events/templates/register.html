{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-body">
                <h3 class="text-center mb-4">Student Registration</h3>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="d-grid">
                        <button class="btn btn-primary">Create Account</button>
                    </div>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
